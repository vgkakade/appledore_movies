services:
  django:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - ${DJANGO_PORT}:8000
    depends_on:
      - postgres
      - elasticsearch
      - redis
    env_file:
      - .env

  postgres:
    image: postgres:14
    environment:
      - POSTGRES_USER=${DOCKER_USER}
      - POSTGRES_PASSWORD=${DOCKER_PASSWORD}
      - POSTGRES_DB=docker
    ports:
      - ${DATABASE_PORT}:5432
    volumes:
      - postgres:/var/lib/postgresql/data

  elasticsearch:
    image: elasticsearch:9.2.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data

  kibana:
    image: kibana:9.2.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  redis:
    image: redis:8.8-m03-alpine3.23
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis-data:/data

  celery_worker:
    build: .
    command: celery -A appledore_movies worker --loglevel=info
    depends_on:
      - postgres
      - redis
      - elasticsearch
    env_file:
      - .env

  celery_beat:
    build: .
    command: celery -A appledore_movies beat --loglevel=info
    depends_on:
      - postgres
      - redis
      - elasticsearch
    env_file:
      - .env

volumes:
  postgres:
    name: ${VOLUME_PREFIX}_postgres14
  elasticsearch-data:
    name: ${VOLUME_PREFIX}_elasticsearch
  redis-data:
    name: ${VOLUME_PREFIX}_redis
